<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bolt" x1="10" y1="2" x2="22" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Inner glow overlay -->
  <rect width="32" height="32" rx="8" fill="white" fill-opacity="0.08"/>
  <!-- Lightning bolt (Zap) -->
  <path d="M18 3L8 17h7l-1 12 11-14h-7l1-12z" fill="url(#bolt)" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
</svg>
